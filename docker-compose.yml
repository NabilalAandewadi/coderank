# CodeRank — Unified Orchestration
# Backing services: PostgreSQL (per-service DB), Redis, Kafka (KRaft mode, no Zookeeper)
# All env-var names map 1:1 to the placeholders found in each service's application.yml.

services:

  # ════════════════════════════════════════════════════════════════════════
  # INFRASTRUCTURE — Databases
  # ════════════════════════════════════════════════════════════════════════

  postgres-auth:
    image: postgres:15-alpine
    container_name: coderank-postgres-auth
    environment:
      POSTGRES_DB: coderank_auth
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: abhinav195
    ports:
      - "5434:5432"
    volumes:
      - postgres_auth_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d coderank_auth"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - coderank-net

  postgres-problem:
    image: postgres:15-alpine
    container_name: coderank-postgres-problem
    environment:
      POSTGRES_DB: coderankproblem
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: abhinav195
    ports:
      - "5435:5432"
    volumes:
      - postgres_problem_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d coderankproblem"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - coderank-net

  postgres-submission:
    image: postgres:15-alpine
    container_name: coderank-postgres-submission
    environment:
      POSTGRES_DB: coderank_submission
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: abhinav195
    ports:
      - "5436:5432"
    volumes:
      - postgres_submission_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d coderank_submission"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - coderank-net

  # ════════════════════════════════════════════════════════════════════════
  # INFRASTRUCTURE — Redis
  # ════════════════════════════════════════════════════════════════════════

  redis:
    image: redis:7-alpine
    container_name: coderank-redis
    ports:
      - "6379:6379"
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - coderank-net

  # ════════════════════════════════════════════════════════════════════════
  # INFRASTRUCTURE — Kafka (KRaft mode — no Zookeeper)
  # Dual listeners:
  #   INTERNAL://kafka:29092   → for services inside the Docker network
  #   EXTERNAL://localhost:9092 → for host-machine clients (kafka-console-*)
  # ════════════════════════════════════════════════════════════════════════

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: coderank-kafka
    ports:
      - "9092:9092"
    environment:
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:29093"
      KAFKA_LISTENERS: "INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092,CONTROLLER://0.0.0.0:29093"
      KAFKA_ADVERTISED_LISTENERS: "INTERNAL://kafka:29092,EXTERNAL://localhost:9092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: "INTERNAL"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 24
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - coderank-net

  # ════════════════════════════════════════════════════════════════════════
  # APPLICATION SERVICES
  # ════════════════════════════════════════════════════════════════════════

  coderank-auth:
    build:
      context: .
      dockerfile: coderank-auth/Dockerfile
    container_name: coderank-auth
    ports:
      - "8081:8081"
    environment:
      DB_HOST: postgres-auth
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: abhinav195
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
    depends_on:
      postgres-auth:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - coderank-net
    restart: on-failure
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      start_period: 40s
      retries: 3

  coderank-problem:
    build:
      context: .
      dockerfile: coderank-problem/Dockerfile
    container_name: coderank-problem
    ports:
      - "8082:8082"
    environment:
      DB_HOST: postgres-problem
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: abhinav195
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SUBMISSION_SERVICE_HOST: coderank-submission
    depends_on:
      postgres-problem:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - coderank-net
    restart: on-failure
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8082/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      start_period: 40s
      retries: 3

  coderank-submission:
    build:
      context: .
      dockerfile: coderank-submission/Dockerfile
    container_name: coderank-submission
    ports:
      - "8083:8083"
    environment:
      DB_HOST: postgres-submission
      DB_NAME: coderank_submission
      DB_USER: postgres
      DB_PASS: abhinav195
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    depends_on:
      postgres-submission:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - coderank-net
    restart: on-failure
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8083/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      start_period: 40s
      retries: 3

  coderank-execution:
    build:
      context: .
      dockerfile: coderank-execution/Dockerfile
    container_name: coderank-execution
    ports:
      - "8084:8084"
    extra_hosts:
      - "host.docker.internal:host-gateway"   # ← ADD THIS
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      PROBLEM_SERVICE_HOST: coderank-problem
      EXECUTION_TIMEOUT_SECONDS: 10
      EXECUTION_MEMORY_MB: 128
      EXECUTION_CPU_QUOTA: 50000
      DOCKER_HOST: tcp://host.docker.internal:2375
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      coderank-problem:
        condition: service_healthy
    networks:
      - coderank-net
    restart: on-failure
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:8084/actuator/health || exit 1" ]
      interval: 15s
      timeout: 5s
      start_period: 40s
      retries: 3

  coderank-result-processor:
    build:
      context: .
      dockerfile: coderank-result-processor/Dockerfile
    container_name: coderank-result-processor
    ports:
      - "8085:8085"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SUBMISSION_SERVICE_URL: http://coderank-submission:8083
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      coderank-submission:
        condition: service_started
    networks:
      - coderank-net
    restart: on-failure
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8085/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      start_period: 40s
      retries: 3

  coderank-gateway:
    build:
      context: .
      dockerfile: coderank-gateway/Dockerfile
    container_name: coderank-gateway
    ports:
      - "8080:8080"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
      AUTH_SERVICE_HOST: coderank-auth
      PROBLEM_SERVICE_HOST: coderank-problem
      SUBMISSION_SERVICE_HOST: coderank-submission
    depends_on:
      redis:
        condition: service_healthy
      coderank-auth:
        condition: service_started
      coderank-problem:
        condition: service_started
      coderank-submission:
        condition: service_started
    networks:
      - coderank-net
    restart: on-failure
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      start_period: 40s
      retries: 3

# ════════════════════════════════════════════════════════════════════════
# VOLUMES & NETWORKS
# ════════════════════════════════════════════════════════════════════════

volumes:
  postgres_auth_data:
  postgres_problem_data:
  postgres_submission_data:
  redis_data:
  kafka_data:

networks:
  coderank-net:
    driver: bridge