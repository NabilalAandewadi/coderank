server:
  port: 8080

spring:
  application:
    name: coderank-gateway

  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms

  cloud:
    gateway:
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOriginPatterns: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
            allowCredentials: true

      routes:

        # ─────────────────────────────────────────────
        # BLOCK: Internal endpoints — must NEVER be
        # reachable from outside. Matched FIRST (highest
        # priority) so no downstream route can shadow it.
        # ─────────────────────────────────────────────
        - id: block-internal
          uri: no://op
          predicates:
            - Path=/api/v1/internal/**
          filters:
            - name: SetStatus
              args:
                status: 403

        # ─────────────────────────────────────────────
        # AUTH SERVICE — Port 8081
        # Public endpoints: no JWT required
        # ─────────────────────────────────────────────
        - id: auth-service
          uri: http://${AUTH_SERVICE_HOST:coderank-auth}:8081
          predicates:
            - Path=/api/v1/auth/**
          filters:
            - name: CircuitBreaker
              args:
                name: auth-circuit-breaker
                fallbackUri: forward:/fallback/auth
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 20
                redis-rate-limiter.burstCapacity: 40
                redis-rate-limiter.requestedTokens: 1
                key-resolver: "#{@ipKeyResolver}"

        # ─────────────────────────────────────────────
        # PROBLEM SERVICE — Port 8082
        # Protected: JWT required (ROLE_USER / ROLE_ADMIN)
        # ─────────────────────────────────────────────
        - id: problem-service-problems
          uri: http://${PROBLEM_SERVICE_HOST:coderank-problem}:8082
          predicates:
            - Path=/api/v1/problems/**
          filters:
            - name: CircuitBreaker
              args:
                name: problem-circuit-breaker
                fallbackUri: forward:/fallback/problem
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 30
                redis-rate-limiter.burstCapacity: 60
                redis-rate-limiter.requestedTokens: 1
                key-resolver: "#{@userKeyResolver}"

        - id: problem-service-topics
          uri: http://${PROBLEM_SERVICE_HOST:coderank-problem}:8082
          predicates:
            - Path=/api/v1/topics/**
          filters:
            - name: CircuitBreaker
              args:
                name: problem-circuit-breaker
                fallbackUri: forward:/fallback/problem
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 30
                redis-rate-limiter.burstCapacity: 60
                redis-rate-limiter.requestedTokens: 1
                key-resolver: "#{@userKeyResolver}"

        - id: problem-service-companies
          uri: http://${PROBLEM_SERVICE_HOST:coderank-problem}:8082
          predicates:
            - Path=/api/v1/companies/**
          filters:
            - name: CircuitBreaker
              args:
                name: problem-circuit-breaker
                fallbackUri: forward:/fallback/problem
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 30
                redis-rate-limiter.burstCapacity: 60
                redis-rate-limiter.requestedTokens: 1
                key-resolver: "#{@userKeyResolver}"

        # ─────────────────────────────────────────────
        # SUBMISSION SERVICE — Port 8083
        # Protected: JWT required (ROLE_USER / ROLE_ADMIN)
        # ─────────────────────────────────────────────
        - id: submission-service-execute
          uri: http://${SUBMISSION_SERVICE_HOST:coderank-submission}:8083
          predicates:
            - Path=/api/v1/execute/**
          filters:
            - name: CircuitBreaker
              args:
                name: submission-circuit-breaker
                fallbackUri: forward:/fallback/submission
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 10
                redis-rate-limiter.burstCapacity: 20
                redis-rate-limiter.requestedTokens: 1
                key-resolver: "#{@userKeyResolver}"

        - id: submission-service-submissions
          uri: http://${SUBMISSION_SERVICE_HOST:coderank-submission}:8083
          predicates:
            - Path=/api/v1/submissions/**
          filters:
            - name: CircuitBreaker
              args:
                name: submission-circuit-breaker
                fallbackUri: forward:/fallback/submission
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 10
                redis-rate-limiter.burstCapacity: 20
                redis-rate-limiter.requestedTokens: 1
                key-resolver: "#{@userKeyResolver}"

# ─────────────────────────────────────────────
# RESILIENCE4J — Circuit Breakers per service
# ─────────────────────────────────────────────
resilience4j:
  circuitbreaker:
    instances:
      auth-circuit-breaker:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 10s
        failureRateThreshold: 50
        eventConsumerBufferSize: 10

      problem-circuit-breaker:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 10s
        failureRateThreshold: 50
        eventConsumerBufferSize: 10

      submission-circuit-breaker:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 10s
        failureRateThreshold: 50
        eventConsumerBufferSize: 10

  timelimiter:
    instances:
      auth-circuit-breaker:
        timeoutDuration: 5s
      problem-circuit-breaker:
        timeoutDuration: 5s
      submission-circuit-breaker:
        timeoutDuration: 10s

# ─────────────────────────────────────────────
# JWT CONFIG
# ─────────────────────────────────────────────
jwt:
  secret: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}

# ─────────────────────────────────────────────
# ACTUATOR
# ─────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,circuitbreakers
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    com.coderank: DEBUG
    org.springframework.cloud.gateway: INFO