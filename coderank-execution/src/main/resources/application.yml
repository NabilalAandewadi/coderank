server:
  port: 8084

spring:
  application:
    name: coderank-execution

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
      properties:
        enable.idempotence: true
        spring.json.add.type.headers: false
    consumer:
      group-id: coderank-execution-group
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.trusted.packages: com.coderank.common.event
        spring.json.value.default.type: com.coderank.common.event.CodeExecutionRequestEvent
        spring.json.use.type.headers: false
        max.poll.records: 5

# ── Problem Service internal call (FAULT-02 FIX) ──────────────────────────────
problem-service:
  url: http://${PROBLEM_SERVICE_HOST:coderank-problem}:8082

# ── Docker sandbox config ──────────────────────────────────────────────────────
execution:
  docker:
    timeout-seconds: ${EXECUTION_TIMEOUT_SECONDS:10}
    memory-limit-mb: ${EXECUTION_MEMORY_MB:128}
    cpu-quota: ${EXECUTION_CPU_QUOTA:50000}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.coderank: DEBUG
    org.springframework.kafka: INFO