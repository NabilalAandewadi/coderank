server:
  port: 8082

spring:
  application:
    name: coderank-problem

  datasource:
    url: jdbc:postgresql://${DB_HOST:postgres-problem}:${DB_PORT:5432}/coderankproblem
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms

  flyway:
    enabled: true
    locations: classpath:db/migration

  # ─── NEW: Kafka Consumer (state-update-events → Problem Service) ──────────
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
    consumer:
      group-id: problem-service-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.coderank.common.event"
        spring.json.use.type.headers: false
        spring.json.value.default.type: com.coderank.common.event.StateUpdateEvent
        isolation.level: read_committed
    listener:
      ack-mode: MANUAL_IMMEDIATE

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

# ─── NEW: Submission Service internal call (Step 3 of locked flow) ──────────
submission-service:
  url: http://${SUBMISSION_SERVICE_HOST:coderank-submission}:8083

logging:
  level:
    com.coderank: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: DEBUG
    org.apache.kafka: WARN